name: Validate manifests

on:
  push:
    branches:
      - 'renovate/**'

permissions:
  contents: read

jobs:
  kustomize-build:
    name: kustomize build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install kustomize
        run: |
          version=5.4.3
          curl -fsSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${version}/kustomize_v${version}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin kustomize
          kustomize version

      - name: Build changed overlays
        run: |
          set -euo pipefail
          mapfile -t dirs < <(
            git diff --name-only origin/main...HEAD \
              | { grep -E '(^|/)kustomization\.ya?ml$' || true; } \
              | xargs -r -n1 dirname \
              | sort -u
          )
          if [ ${#dirs[@]} -eq 0 ]; then
            echo "No kustomization changes to validate."
            exit 0
          fi
          rc=0
          for d in "${dirs[@]}"; do
            echo "::group::kustomize build --enable-helm $d"
            kustomize build --enable-helm "$d" >/dev/null || { echo "::error::kustomize build failed in $d"; rc=1; }
            echo "::endgroup::"
          done
          exit $rc
