apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: audiobookshelf

labels:
- pairs:
    environment: homelab
- includeSelectors: true
  pairs:
    app: audiobookshelf

resources:
- pvc.yaml
- deployment.yaml
- service.yaml
- ingress.yaml

images:
- name: audiobookshelf
  newName: ghcr.io/advplyr/audiobookshelf
  newTag: 2.34.0
