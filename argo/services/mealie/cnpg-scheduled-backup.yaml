---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: mealie-db-scheduled-backup
spec:
  schedule: "0 30 2 * * *"
  backupOwnerReference: self
  target: prefer-standby
  cluster:
    name: mealie-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
    parameters:
      barmanObjectName: garage
