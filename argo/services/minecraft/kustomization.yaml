apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: minecraft

resources:
  - pvc.yaml
  - deployment.yaml
  - service.yaml

labels:
- pairs:
    environment: homelab
- includeSelectors: true
  pairs:
    app: minecraft

images:
  - name: itzg/minecraft-server
    newTag: stable
