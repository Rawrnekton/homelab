apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: sealed-secrets-keys
  namespace: velero
spec:
  schedule: "0 4 * * *"
  template:
    storageLocation: garage
    ttl: 720h
    snapshotVolumes: false
    defaultVolumesToFsBackup: false
    includedNamespaces:
      - kube-system
    includedResources:
      - secrets
    labelSelector:
      matchLabels:
        sealedsecrets.bitnami.com/sealed-secrets-key: active
