---
# tasks file for haproxy

- name: Install HAProxy
  ansible.builtin.apt:
    name: haproxy
    state: present

- name: Ensure SSL directory exists
  ansible.builtin.file:
    path: /etc/haproxy/ssl/
    state: directory
    owner: root
    group: root
    mode: "0700"

# build a flat list of all domains that need certificates
# use this if I ever want to go back to full fqdns in the service name
# - name: Build list of all HTTPS domains
#   ansible.builtin.set_fact:
#     _haproxy_all_domains: >-
#       {{ haproxy_https_backends | map(attribute='domains') | flatten | unique }}

- name: Build list of all HTTPS domains
  ansible.builtin.set_fact:
    _haproxy_all_domains: >-
      {{ haproxy_https_backends
         | map(attribute='domains')
         | flatten
         | unique
         | map('regex_replace', '$', '.' ~ haproxy_base_domain)
         | list }}

- name: Check if certificate file exists for each domain
  ansible.builtin.stat:
    path: "/etc/haproxy/ssl/{{ item }}.pem"
  loop: "{{ _haproxy_all_domains }}"
  register: _cert_files

- name: Generate private key for domains without a PEM
  community.crypto.openssl_privatekey:
    path: "/etc/haproxy/ssl/{{ item.item }}.key"
  when: not item.stat.exists
  loop: "{{ _cert_files.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Create CSR for domains without a PEM
  community.crypto.openssl_csr:
    privatekey_path: "/etc/haproxy/ssl/{{ item.item }}.key"
    common_name: "{{ item.item }}"
    subject_alt_name:
      - "DNS:{{ item.item }}"
    path: "/etc/haproxy/ssl/{{ item.item }}.csr"
  when: not item.stat.exists
  loop: "{{ _cert_files.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Create self-signed certificate for domains without a PEM
  community.crypto.x509_certificate:
    path: "/etc/haproxy/ssl/{{ item.item }}.crt"
    privatekey_path: "/etc/haproxy/ssl/{{ item.item }}.key"
    csr_path: "/etc/haproxy/ssl/{{ item.item }}.csr"
    provider: selfsigned
  when: not item.stat.exists
  loop: "{{ _cert_files.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Assemble PEM from key + cert
  ansible.builtin.shell: >
    cat
    /etc/haproxy/ssl/{{ item.item }}.key
    /etc/haproxy/ssl/{{ item.item }}.crt
    > /etc/haproxy/ssl/{{ item.item }}.pem
  args:
    executable: /bin/bash
  when: not item.stat.exists
  changed_when: true
  loop: "{{ _cert_files.results }}"
  loop_control:
    label: "{{ item.item }}"
  notify: Restart HAProxy

- name: Set permissions on PEM files
  ansible.builtin.file:
    path: "/etc/haproxy/ssl/{{ item.item }}.pem"
    owner: root
    group: root
    mode: "0600"
  when: not item.stat.exists
  loop: "{{ _cert_files.results }}"
  loop_control:
    label: "{{ item.item }}"

# Cleanup intermediate files
- name: Find intermediate cert files (crt, csr, key)
  ansible.builtin.find:
    paths: /etc/haproxy/ssl
    patterns:
      - "*.crt"
      - "*.key"
      - "*.csr"
    recurse: false
  register: _files_to_delete

- name: Remove intermediate cert files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ _files_to_delete.files }}"
  loop_control:
    label: "{{ item.path | basename }}"

- name: Deploy HAProxy configuration
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: '0644'
    validate: haproxy -c -f %s
  notify: Restart HAProxy
