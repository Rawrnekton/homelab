---
# tasks file for iscsi-client

# First enriching every portal with portal_ip and every target with an `iscsi_dev` key
# (the stable /dev/disk/by-pathdevice node) so later tasks (filesystem create, mount/fstab)
# don't rebuild the path string themselves.
#
# Resulting shape of iscsi_client_targets:
#   - name: <portal display name>
#     portal: <portal FQDN or IP, as configured>
#     # added by - name: Add portal_ip attribute
#     portal_ip: <resolved IP>
#     port: <int, optional, default 3260>
#     targets:
#       - name: <target IQN>
#         human_readable_name: <label>
#         mountpoint: <path>
#         user: <chap user, optional>
#         password: <chap password, optional>
#         fstype: <optional, default ext4>
#         # added by - name: Add iscsi_dev path to each target
#         iscsi_dev: /dev/disk/by-path/ip-<portal_ip>:<port>-iscsi-<IQN>-lun-0

# DNS lookups must resolve against this host, not the control node: with
# split-horizon DNS, the controller's view of a portal FQDN (e.g. a
# WireGuard/NAT-forwarded external address) can differ from what this host
# resolves internally. lookup() plugins always run on the control node, so
# resolution is done via a command task instead, which runs here. getent
# (rather than dig) is used so it goes through this host's NSS/resolver
# path exactly as the iSCSI initiator itself will.
- name: Resolve portal FQDNs on this host
  ansible.builtin.command:
    cmd: getent hosts {{ item.portal }}
  loop: "{{ iscsi_client_targets }}"
  loop_control:
    label: "{{ item.name }}"
  when: not (item.portal | ansible.utils.ipaddr)
  changed_when: false
  register: portal_dns

- name: Add portal_ip attribute
  ansible.builtin.set_fact:
    iscsi_client_targets: >-
      {%- set result = [] -%}
      {%- for portal in iscsi_client_targets -%}
        {%- set ip = portal.portal if (portal.portal | ansible.utils.ipaddr)
              else portal_dns.results[loop.index0].stdout_lines[0].split()[0] -%}
        {%- set _ = result.append(portal | combine({'portal_ip': ip})) -%}
      {%- endfor -%}
      {{ result }}

- name: Add iscsi_dev path to each target
  ansible.builtin.set_fact:
    iscsi_client_targets: >-
      {%- set result = [] -%}
      {%- for portal in iscsi_client_targets -%}
        {%- set targets = [] -%}
        {%- for target in portal.targets -%}
          {%- set dev = '/dev/disk/by-path/ip-' ~ portal.portal_ip ~ ':' ~ (portal.port | default(3260)) ~ '-iscsi-' ~ target.name ~ '-lun-0' -%}
          {%- set _ = targets.append(target | combine({'iscsi_dev': dev})) -%}
        {%- endfor -%}
        {%- set _ = result.append(portal | combine({'targets': targets})) -%}
      {%- endfor -%}
      {{ result }}

- name: Install iscsi initiator utilities
  ansible.builtin.package:
    name: open-iscsi
    state: present

- name: Ensure iscsid is running
  ansible.builtin.service:
    name: iscsid
    state: started
    enabled: true

- name: Ensure open-iscsi boot-time login service is enabled
  ansible.builtin.service:
    name: open-iscsi
    enabled: true

# sendtargets discovery has two destructive side effects this avoids:
# it re-creates node records for every IQN the portal advertises (not just
# the ones that get configured) and, on every run, resets each record's keys back
# to iscsid.conf defaults, which would wipe the CHAP password and
# node.startup written by the login task below. The exact(portal, target) pairs
# are already know, so the records are created directly here
# let community.general.open_iscsi persist auth + node.startup on login.
- name: Create iSCSI node record for each desired target
  ansible.builtin.command:
    cmd: >-
      iscsiadm -m node -o new
      -T {{ target.name }}
      -p {{ portal.portal_ip }}:{{ portal.port | default(3260) }}
    creates: "/etc/iscsi/nodes/{{ target.name }}/{{ portal.portal_ip }},{{ portal.port | default(3260) }},1/default"
  loop: "{{ iscsi_client_targets | subelements('targets') }}"
  loop_control:
    label: "{{ portal.name }} -> {{ target.human_readable_name }}"
  vars:
    portal: "{{ item.0 }}"
    target: "{{ item.1 }}"

- name: ISCSI login for all targets on all portals
  community.general.open_iscsi:
    login: true
    portal: "{{ portal.portal }}"
    port: "{{ portal.port | default(3260) }}"
    target: "{{ target.name }}"
    auto_node_startup: true
    node_auth: "{{ 'CHAP' if (target.user is defined and target.password is defined) else omit }}"
    node_user: "{{ target.user | default(omit) }}"
    node_pass: "{{ target.password | default(omit) }}"
  loop: "{{ iscsi_client_targets | subelements('targets') }}"
  loop_control:
    label: "{{ portal.name }} -> {{ target.human_readable_name }} ({{ target.name }})"
  vars:
    portal: "{{ item.0 }}"
    target: "{{ item.1 }}"

- name: Enumerate currently cached iSCSI node IQNs
  ansible.builtin.command: iscsiadm -m node
  register: iscsi_cached_nodes
  changed_when: false
  failed_when: iscsi_cached_nodes.rc not in [0, 21]

- name: Wait for device nodes
  ansible.builtin.wait_for:
    path: "{{ target.iscsi_dev }}"
    state: present
    timeout: 60
  loop: "{{ iscsi_client_targets | subelements('targets') }}"
  loop_control:
    label: "{{ portal.portal }} -> {{ target.name }}"
  vars:
    portal: "{{ item.0 }}"
    target: "{{ item.1 }}"

- name: Create filesystem (unformatted LUN -> ext4)
  community.general.filesystem:
    fstype: "{{ target.fstype | default('ext4') }}"
    dev: "{{ target.iscsi_dev }}"
  loop: "{{ iscsi_client_targets | subelements('targets') }}"
  loop_control:
    label: "{{ portal.portal }} -> {{ target.name }}"
  vars:
    portal: "{{ item.0 }}"
    target: "{{ item.1 }}"

- name: Ensure mount point exists
  ansible.builtin.file:
    path: "{{ target.mountpoint }}"
    state: directory
    mode: "0750"
  loop: "{{ iscsi_client_targets | subelements('targets') }}"
  loop_control:
    label: "{{ portal.portal }} -> {{ target.name }}"
  vars:
    portal: "{{ item.0 }}"
    target: "{{ item.1 }}"

- name: Mount and persist in fstab (writable)
  ansible.posix.mount:
    path: "{{ target.mountpoint }}"
    src: "{{ target.iscsi_dev }}"
    fstype: "{{ target.fstype | default('ext4') }}"
    opts: "rw,_netdev,nofail,x-systemd.requires=open-iscsi.service,x-systemd.device-timeout=30"
    state: mounted
  loop: "{{ iscsi_client_targets | subelements('targets') }}"
  loop_control:
    label: "{{ portal.portal }} -> {{ target.name }}"
  vars:
    portal: "{{ item.0 }}"
    target: "{{ item.1 }}"
